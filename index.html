<!DOCTYPE html>
<html>
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>WebXR Visualizer Foundation</title>
	</head>
	<body>
		<script src="butterchurn.min.js"></script>
		<script src="butterchurnPresets.min.js"></script>
		<script src="xr-app-shell.js"></script>
		<script src="xr-app-runtime.js"></script>
		<script src="xr-visualizer-utils.js"></script>
		<script src="xr-audio-controller.js"></script>
		<script src="xr-locomotion.js"></script>
		<script src="xr-menu-ui.js"></script>
		<script src="xr-menu-controller.js"></script>
		<script src="xr-scene-renderer.js"></script>
		<script src="xr-scene-lighting.js"></script>
		<script src="xr-visualizer-gl-utils.js"></script>
		<script src="xr-visualizer-source-butterchurn.js"></script>
		<script src="xr-visualizer-manager.js"></script>
		<script src="xr-visualizer-mode-fullscreen.js"></script>
		<script src="xr-visualizer-mode-toroidal.js"></script>
		<script src="xr-visualizer-mode-stereo-volume.js"></script>
		<script src="glb-asset-manager.js"></script>
		<script>
			// Main app entry: owns XR session setup, desktop preview, world rendering, and UI wiring.
			document.body.style.backgroundColor = "#000020";
			document.body.style.color = "#ffff00";
			document.body.style.margin = "0";
			document.body.style.overflow = "hidden";
			document.body.style.fontFamily = "Arial, sans-serif";

			// Group related tuning together so each module is wired with one coherent config object.
			const sceneConfig = {
				floorHalfSize: 40,
				maxSceneLights: window.xrSceneLighting && window.xrSceneLighting.MAX_DIRECTIONAL_LIGHTS ? window.xrSceneLighting.MAX_DIRECTIONAL_LIGHTS : 4,
				menuWidth: 0.74,
				sceneGlbAssets: [
				{
					url: "https://phobi82.github.io/Phobis-Crystal-Lake/goat.glb",
					position: {x: -1.4, y: 0.256, z: -2.6},
					scale: 1,
					rotationY: -0.55,
					collisionBool: true
				}
				],
				levelBoxes: [
				{x: 0, y: 0.6, z: -6, width: 2.4, height: 1.2, depth: 2.4, color: [0.2, 0.72, 1, 0.72]},
				{x: -3.6, y: 0.9, z: -10.5, width: 2.6, height: 1.8, depth: 2.6, color: [1, 0.55, 0.2, 0.72]},
				{x: 4.2, y: 1.3, z: -13.5, width: 3, height: 2.6, depth: 3, color: [0.3, 1, 0.55, 0.72]},
				{x: 0, y: 1.2, z: -18, width: 8, height: 2.4, depth: 1.3, color: [1, 0.28, 0.42, 0.68]},
				{x: -8.5, y: 1.6, z: -8, width: 1.2, height: 3.2, depth: 10, color: [0.95, 0.2, 0.8, 0.48]},
				{x: 8.5, y: 1.6, z: -8, width: 1.2, height: 3.2, depth: 10, color: [0.1, 0.95, 0.9, 0.48]}
				]
			};
			const shellConfig = {
				title: "WebXR Visualizer Foundation",
				xrHintText: "VR: left stick move, right stick turn, A jump, Y menu, trigger menu select / slider drag.",
				desktopHintText: "Desktop: click view + mouse look, WASD move, left mouse sprint, right mouse crouch, Space jump, M menu.",
				audioHintText: "YouTube Playlist and Suno Live Radio open the tab automatically. In the share dialog, choose that tab and enable tab audio."
			};
			const audioConfig = {
				youtubePlaylistUrl: "https://www.youtube.com/playlist?list=PLIEp7kQLbRSheVOUHZLuqj3fHO415l3Y-&autoplay=1",
				youtubeWindowName: "webxrYoutubePlaylist",
				sunoLiveRadioUrl: "https://suno.com/labs/live-radio",
				sunoWindowName: "webxrSunoLiveRadio"
			};
			const locomotionConfig = {
				walkSpeed: 4,
				sprintMultiplier: 2,
				turnSpeed: 2,
				jumpSpeed: 3.55,
				jumpHoldBoostSpeed: 6.5,
				jumpHoldMaxSeconds: 0.22,
				airBoostSpeed: 14,
				airMomentumDrag: 0.35,
				groundMomentumDrag: 10,
				doubleJumpMaxCount: 2,
				jumpGravity: -8.6,
				fallResetY: -25,
				playerRadius: 0.32,
				playerHeadClearance: 0.12,
				defaultEyeHeight: 1.7, // Body height minus 10 cm.
				tiptoeEyeHeightBoost: 0.3,
				crouchMinEyeHeight: 0.5,
				crouchSpeed: 1.8,
				climbSpeed: 2.4,
				stepHeight: 0.5,
				desktopStartZ: 5.6,
				desktopStartPitch: -0.16
			};
			const menuConfig = {
				rayLength: 4,
				eyeDistanceMin: 0.02,
				eyeDistanceMax: 0.2,
				floorAlphaMin: 0,
				floorAlphaMax: 1,
				desktopMenuPreviewWidthPixels: 420,
				jumpModeDoubleMinU: 0.1,
				jumpModeDoubleMaxU: 0.45,
				jumpModeMultiMinU: 0.55,
				jumpModeMultiMaxU: 0.9,
				menuSliderMinU: 0.18,
				menuSliderMaxU: 0.82,
				menuSliderHalfHeight: 0.055,
				presetPrevMinU: 0.08,
				presetPrevMaxU: 0.22,
				presetNextMinU: 0.78,
				presetNextMaxU: 0.92,
				initialJumpMode: "double",
				initialFloorAlpha: 0.72,
				initialEyeDistanceMeters: 0.064,
				initialDesktopPreviewVisibleBool: true
			};
			const runtimeConfig = {
				desktopMouseSensitivity: 0.0024,
				stickDeadzone: 0.08,
				stanceStickDeadzone: 0.22,
				stanceVerticalDominanceMargin: 0.12
			};

			// Shared resources keep cross-module links explicit without spreading runtime globals.
			const sharedResources = {
				glbAssetManager: null,
				sceneLighting: null,
				visualizerRenderer: null
			};
			const appShell = window.createXrAppShell(shellConfig);
			const canvas = appShell.canvas;
			const setStatus = appShell.setStatus;
			const menuUi = window.createXrMenuUi({
				desktopMenuPreviewWidthPixels: menuConfig.desktopMenuPreviewWidthPixels,
				jumpModeDoubleMinU: menuConfig.jumpModeDoubleMinU,
				jumpModeDoubleMaxU: menuConfig.jumpModeDoubleMaxU,
				jumpModeMultiMinU: menuConfig.jumpModeMultiMinU,
				jumpModeMultiMaxU: menuConfig.jumpModeMultiMaxU,
				menuSliderMinU: menuConfig.menuSliderMinU,
				menuSliderMaxU: menuConfig.menuSliderMaxU,
				menuSliderHalfHeight: menuConfig.menuSliderHalfHeight,
				presetPrevMinU: menuConfig.presetPrevMinU,
				presetPrevMaxU: menuConfig.presetPrevMaxU,
				presetNextMinU: menuConfig.presetNextMinU,
				presetNextMaxU: menuConfig.presetNextMaxU
			});

			const utils = window.xrVisualizerUtils;
			const clampNumber = utils.clampNumber;
			const hslToRgb = utils.hslToRgb;
			const emptyAudioMetrics = utils.emptyAudioMetrics;
			const rotateXZ = utils.rotateXZ;
			const extractForwardDirectionFromQuaternion = utils.extractForwardDirectionFromQuaternion;
			const identityMatrix = utils.identityMatrix;
			const multiplyMatrices = utils.multiplyMatrices;
			const translateScale = utils.translateScale;
			const translateRotateYScale = utils.translateRotateYScale;
			const basisScale = utils.basisScale;
			const audioController = window.createXrAudioController({
				setStatus: setStatus,
				youtubePlaylistUrl: audioConfig.youtubePlaylistUrl,
				youtubeWindowName: audioConfig.youtubeWindowName,
				sunoLiveRadioUrl: audioConfig.sunoLiveRadioUrl,
				sunoWindowName: audioConfig.sunoWindowName,
				onStateChange: appShell.setAudioState
			});
			const locomotionController = window.createXrLocomotionController({
				defaultEyeHeight: locomotionConfig.defaultEyeHeight,
				playerHeadClearance: locomotionConfig.playerHeadClearance,
				floorHalfSize: sceneConfig.floorHalfSize,
				playerRadius: locomotionConfig.playerRadius,
				stepHeight: locomotionConfig.stepHeight,
				crouchMinEyeHeight: locomotionConfig.crouchMinEyeHeight,
				tiptoeEyeHeightBoost: locomotionConfig.tiptoeEyeHeightBoost,
				crouchSpeed: locomotionConfig.crouchSpeed,
				walkSpeed: locomotionConfig.walkSpeed,
				sprintMultiplier: locomotionConfig.sprintMultiplier,
				climbSpeed: locomotionConfig.climbSpeed,
				jumpGravity: locomotionConfig.jumpGravity,
				jumpSpeed: locomotionConfig.jumpSpeed,
				jumpHoldBoostSpeed: locomotionConfig.jumpHoldBoostSpeed,
				jumpHoldMaxSeconds: locomotionConfig.jumpHoldMaxSeconds,
				doubleJumpMaxCount: locomotionConfig.doubleJumpMaxCount,
				airBoostSpeed: locomotionConfig.airBoostSpeed,
				airMomentumDrag: locomotionConfig.airMomentumDrag,
				groundMomentumDrag: locomotionConfig.groundMomentumDrag,
				fallResetY: locomotionConfig.fallResetY,
				turnSpeed: locomotionConfig.turnSpeed,
				desktopStartZ: locomotionConfig.desktopStartZ,
				desktopStartPitch: locomotionConfig.desktopStartPitch,
				levelBoxes: sceneConfig.levelBoxes,
				getGlbCollisionBoxes: function() {
					return sharedResources.glbAssetManager && sharedResources.glbAssetManager.getCollisionBoxes ? sharedResources.glbAssetManager.getCollisionBoxes() : [];
				}
			});
			const menuController = window.createXrMenuController({
				menuUi: menuUi,
				menuWidth: sceneConfig.menuWidth,
				rayLength: menuConfig.rayLength,
				menuSliderMinU: menuConfig.menuSliderMinU,
				menuSliderMaxU: menuConfig.menuSliderMaxU,
				eyeDistanceMin: menuConfig.eyeDistanceMin,
				eyeDistanceMax: menuConfig.eyeDistanceMax,
				floorAlphaMin: menuConfig.floorAlphaMin,
				floorAlphaMax: menuConfig.floorAlphaMax,
				initialJumpMode: menuConfig.initialJumpMode,
				initialFloorAlpha: menuConfig.initialFloorAlpha,
				initialEyeDistanceMeters: menuConfig.initialEyeDistanceMeters,
				initialDesktopPreviewVisibleBool: menuConfig.initialDesktopPreviewVisibleBool
			});

			const sceneRenderer = window.createXrSceneRenderer({
				canvas: canvas,
				onInitFailure: function() {
					appShell.enterButton.disabled = true;
					setStatus("WebGL not available.");
				},
				clampNumber: clampNumber,
				levelBoxes: sceneConfig.levelBoxes,
				floorHalfSize: sceneConfig.floorHalfSize,
				menuWidth: sceneConfig.menuWidth,
				identityMatrix: identityMatrix,
				translateScale: translateScale,
				basisScale: basisScale,
				maxSceneLights: sceneConfig.maxSceneLights,
				getSceneLightingUniformLocations: window.getSceneLightingUniformLocations,
				applySceneLightingUniforms: window.applySceneLightingUniforms
			});
			const appRuntime = window.createXrAppRuntime({
				shell: appShell,
				audioController: audioController,
				locomotionController: locomotionController,
				menuController: menuController,
				sceneRenderer: sceneRenderer,
				sharedResources: sharedResources,
				factories: {
					createSceneLightingController: window.createSceneLightingController,
					createGlbAssetManager: window.createGlbAssetManager,
					createXrVisualizerManager: window.createXrVisualizerManager
				},
				math: {
					clampNumber: clampNumber,
					hslToRgb: hslToRgb,
					rotateXZ: rotateXZ,
					extractForwardDirectionFromQuaternion: extractForwardDirectionFromQuaternion
				},
				sceneMath: {
					identityMatrix: identityMatrix,
					multiplyMatrices: multiplyMatrices,
					translateRotateYScale: translateRotateYScale,
					getSceneLightingUniformLocations: window.getSceneLightingUniformLocations,
					applySceneLightingUniforms: window.applySceneLightingUniforms
				},
				config: {
					desktopMouseSensitivity: runtimeConfig.desktopMouseSensitivity,
					stickDeadzone: runtimeConfig.stickDeadzone,
					stanceStickDeadzone: runtimeConfig.stanceStickDeadzone,
					stanceVerticalDominanceMargin: runtimeConfig.stanceVerticalDominanceMargin,
					maxSceneLights: sceneConfig.maxSceneLights,
					sceneGlbAssets: sceneConfig.sceneGlbAssets,
					emptyAudioMetrics: emptyAudioMetrics
				},
				xrApi: navigator.xr || null
			});

			appRuntime.init();
		</script>
	</body>
</html>
